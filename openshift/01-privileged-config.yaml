apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: activedirectory-demo-scc-role
  namespace: ad
  labels:
    app.kubernetes.io/name: activedirectory-demo
    app.kubernetes.io/component: directory
rules:
  - apiGroups:
      - security.openshift.io
    resources:
      - securitycontextconstraints
    resourceNames:
      - activedirectory-demo-scc
    verbs:
      - use
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: activedirectory-demo-scc-rolebinding
  namespace: ad
  labels:
    app.kubernetes.io/name: activedirectory-demo
    app.kubernetes.io/component: directory
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: activedirectory-demo-scc-role
subjects:
  - kind: ServiceAccount
    name: activedirectory-demo-sa
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: activedirectory-demo-scc
  namespace: ad
  labels:
    app.kubernetes.io/name: activedirectory-demo
    app.kubernetes.io/component: directory
allowPrivilegedContainer: true
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
readOnlyRootFilesystem: false
requiredDropCapabilities: []
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: activedirectory-demo-sa
  namespace: ad
  labels:
    app.kubernetes.io/name: activedirectory-demo
    app.kubernetes.io/component: directory

